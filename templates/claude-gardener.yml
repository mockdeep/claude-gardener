# Claude Gardener Configuration
# Copy this file to your repository root as `claude-gardener.yml`

version: 2

# Maximum simultaneous gardener PRs
max_concurrent: 5

# Categories to scan and work on (in priority order)
categories:
  - test_coverage
  - security_fixes
  - linter_fixes
  - code_improvements
  # - add_tooling

# GitHub users to assign and request review from on each PR (optional)
# pr_assignees:
#   - your-github-username
# pr_reviewers:
#   - your-github-username

# Paths to exclude from modifications
excluded_paths:
  - "vendor/**"
  - "node_modules/**"
  - ".github/**"
  - "*.lock"

name: Gardener Handlers

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review-handler:
    if: github.event_name == 'pull_request_review'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Handle review
        uses: mockdeep/claude-gardener/actions/review-handler@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          pr_number: ${{ github.event.pull_request.number }}

  merge-handler:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Handle merge
        uses: mockdeep/claude-gardener/actions/merge-handler@main
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          pr_number: ${{ github.event.pull_request.number }}
